name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: |
          cd localcloud
          wails build -tags webkit2_41 -clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localcloud-linux-amd64
          path: localcloud/build/bin/localcloud

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: |
          cd localcloud
          wails build -clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: localcloud-windows-amd64
          path: localcloud/build/bin/localcloud.exe

  release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: localcloud-linux-amd64

      - uses: actions/download-artifact@v4
        with:
          name: localcloud-windows-amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            localcloud
            localcloud.exe
          draft: true
